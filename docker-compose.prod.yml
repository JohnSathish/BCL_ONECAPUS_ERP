# Production overlay: app server with external managed PostgreSQL.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Set DATABASE_URL to your managed PostgreSQL connection string (SSL required).
# Omit the local postgres service when using managed DB.

services:
  postgres:
    profiles:
      - local-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nep_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nep_erp}

  api:
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${API_NODE_OPTIONS:---max-old-space-size=768}
      HOST: 0.0.0.0
      API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WEB_ORIGIN: ${WEB_ORIGIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      UPLOAD_ROOT: /data/uploads
      STORAGE_ROOT: /data/storage
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      PROCESS_BACKGROUND_JOBS: ${PROCESS_BACKGROUND_JOBS:-api}

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_LOGIN_HOST: ${NEXT_PUBLIC_LOGIN_HOST:-erp.donboscocollege.ac.in}
        NEXT_PUBLIC_SHOW_DEMO_LOGIN: ${NEXT_PUBLIC_SHOW_DEMO_LOGIN:-false}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      API_INTERNAL_ORIGIN: http://api:3001

  worker:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WEB_ORIGIN: ${WEB_ORIGIN}
      UPLOAD_ROOT: /data/uploads
      STORAGE_ROOT: /data/storage
      PROCESS_BACKGROUND_JOBS: worker

  redis:
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
