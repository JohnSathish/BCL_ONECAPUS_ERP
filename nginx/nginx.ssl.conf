worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Docker embedded DNS — re-resolve api/web after container restarts (prevents stale 502s).
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream web_upstream {
    zone web_upstream 64k;
    server web:3000 resolve max_fails=3 fail_timeout=15s;
    keepalive 16;
  }

  upstream api_upstream {
    zone api_upstream 64k;
    server api:3001 resolve max_fails=3 fail_timeout=15s;
    # No keepalive — pooled connections go stale after API container restarts (502).
  }

  # HTTP — ACME challenge + redirect to HTTPS
  server {
    listen 80;
    server_name
      erp.donboscocollege.ac.in
      admissions.donboscocollege.ac.in
      library.donboscocollege.ac.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    http2 on;
    server_name
      erp.donboscocollege.ac.in
      admissions.donboscocollege.ac.in
      library.donboscocollege.ac.in;

    ssl_certificate     /etc/letsencrypt/live/erp.donboscocollege.ac.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.donboscocollege.ac.in/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 500 502 503 504 = @json_gateway_error;

    location /api/ {
      proxy_intercept_errors off;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "close";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   CF-IPCountry $http_cf_ipcountry;
      proxy_connect_timeout 15s;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_next_upstream_timeout 45s;
    }

    location /uploads/ {
      proxy_intercept_errors off;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_read_timeout   3600s;
      proxy_send_timeout   3600s;
    }

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location @json_gateway_error {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      return 502 '{"success":false,"errorCode":"API_GATEWAY_UNAVAILABLE","message":"Upstream service is unavailable.","details":{"gateway":"nginx"},"timestamp":"$time_iso8601","traceId":"$request_id"}';
    }
  }

  # Local health checks without redirect
  server {
    listen 80;
    server_name localhost;

    location /api/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }
  }
}
