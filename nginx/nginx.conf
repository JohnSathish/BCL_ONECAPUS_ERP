worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:3001;
  }

  server {
    listen 80;
    server_name localhost;

    error_page 500 502 503 504 = @json_gateway_error;

    location /api/ {
      proxy_intercept_errors on;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
      proxy_intercept_errors on;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_read_timeout   3600s;
      proxy_send_timeout   3600s;
    }

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location @json_gateway_error {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      return 502 '{"success":false,"errorCode":"API_GATEWAY_UNAVAILABLE","message":"Upstream service is unavailable.","details":{"gateway":"nginx"},"timestamp":"$time_iso8601","traceId":"$request_id"}';
    }
  }
}
