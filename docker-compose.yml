services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nep
      POSTGRES_PASSWORD: nep_dev_password
      POSTGRES_DB: nep_erp
    # Use 15432 on the host so this does not collide with a local PostgreSQL install (common on dev machines).
    ports:
      - '15432:5432'
    volumes:
      - nep_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nep -d nep_erp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://nep:nep_dev_password@postgres:5432/nep_erp
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: change-me-access-dev-only-32chars-min
      JWT_REFRESH_SECRET: change-me-refresh-dev-only-32chars-min
      UPLOAD_ROOT: /data/uploads
      STORAGE_ROOT: /data/storage
    ports:
      - '3001:3001'
    volumes:
      - nep_uploads:/data/uploads
      - nep_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost/api
    ports:
      - '3000:3000'
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://nep:nep_dev_password@postgres:5432/nep_erp
      REDIS_URL: redis://redis:6379
      UPLOAD_ROOT: /data/uploads
      STORAGE_ROOT: /data/storage
      WEB_ORIGIN: http://localhost
    volumes:
      - nep_uploads:/data/uploads
      - nep_storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  nep_pg_data: {}
  nep_uploads: {}
  nep_storage: {}
